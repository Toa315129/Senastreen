<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CANVAS STUDIO | ตู้ถ่ายรูปทรงวาด</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- นำเข้าฟอนต์สไตล์มินิมอล/งานอาร์ต -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Playfair+Display:ital,wght@0,600;1,600&family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            /* โทนสีครีม-งานวาดเขียน */
            --bg-paper: #F7F5F0;
            --bg-paper-dark: #EAE6DF;
            --ink-black: #2A2826;
            --ink-light: #5E5A54;
            --accent-color: #D4A373;
            
            --font-display-en: 'Playfair Display', serif;
            --font-handwriting: 'Caveat', cursive;
            --font-body: 'Prompt', sans-serif;
            
            --frame-preview: none;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            margin: 0; padding: 0;
            background: var(--bg-paper);
            height: 100vh; height: 100dvh; width: 100vw;
            overflow: hidden;
            color: var(--ink-black);
            font-family: var(--font-body);
            display: flex; justify-content: center; align-items: center;
        }

        /* Ambient subtle paper texture overlay */
        body::before {
            content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 999;
            opacity: 0.4; mix-blend-mode: multiply;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
        }

        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            opacity: 0; pointer-events: none;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10;
        }
        .screen.active { opacity: 1; pointer-events: auto; }

        /* --- 1. HOME SCREEN --- */
        #screen-home { 
            justify-content: center; align-items: center; text-align: center;
            background: radial-gradient(circle at center, #FFFCF9 0%, #F0EBE1 100%);
        }
        .title-masthead {
            font-family: var(--font-handwriting); font-weight: 600;
            font-size: clamp(1.8rem, 4vw, 2.5rem); color: var(--accent-color);
            letter-spacing: 2px; margin-bottom: 5px; transform: rotate(-2deg);
        }
        .main-headline {
            font-family: var(--font-display-en);
            font-size: clamp(3rem, 8vw, 5.5rem);
            color: var(--ink-black); margin: 0; line-height: 1.1;
            letter-spacing: 1px;
        }
        .sub-headline {
            font-family: var(--font-body); font-weight: 300;
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--ink-light); margin-top: 20px; margin-bottom: 60px;
            letter-spacing: 2px;
        }
        .btn-editorial {
            background: transparent; border: 2px solid var(--ink-black);
            color: var(--ink-black); padding: 15px 50px;
            font-size: 1.1rem; border-radius: 50px; cursor: pointer;
            transition: all 0.4s ease; font-family: var(--font-body); font-weight: 500;
            letter-spacing: 2px; text-transform: uppercase;
        }
        .btn-editorial:hover { background: var(--ink-black); color: var(--bg-paper); }
        .btn-editorial:active { transform: scale(0.95); }

        /* --- 2. CAMERA SCREEN --- */
        #screen-cam { background: var(--bg-paper-dark); }
        
        .cam-navbar {
            height: 70px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; background: rgba(247, 245, 240, 0.95);
            border-bottom: 1px solid rgba(42, 40, 38, 0.1); z-index: 20;
        }
        .brand-badge { font-family: var(--font-display-en); color: var(--ink-black); font-size: 1.2rem; font-weight: 600; letter-spacing: 1px; }

        .viewport { flex: 1; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #d0c9bd; }
        video#video-feed { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* กรอบพรีวิวบนจอแบบโปร่งใส */
        .frame-overlay-preview {
            position: absolute; inset: 0; pointer-events: none; z-index: 15;
            background-image: var(--frame-preview);
            background-size: contain; background-position: center; background-repeat: no-repeat;
            opacity: 0.9;
        }

        .cam-sidebar {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 50;
        }
        .btn-circle-tool {
            width: 50px; height: 50px; background: rgba(255, 255, 255, 0.8); 
            border: 1px solid rgba(42, 40, 38, 0.2); border-radius: 50%; color: var(--ink-black);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .btn-circle-tool:hover { background: var(--ink-black); color: var(--bg-paper); }

        #countdown {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            font-size: 10rem; font-family: var(--font-display-en); color: #fff; display: none;
            text-shadow: 0 5px 30px rgba(0,0,0,0.3); z-index: 100; font-weight: 600;
        }

        .cam-footer {
            height: 120px; background: rgba(247, 245, 240, 0.95);
            display: flex; align-items: center; justify-content: center; z-index: 20;
            border-top: 1px solid rgba(42, 40, 38, 0.1);
        }
        .shutter-trigger {
            width: 75px; height: 75px; border: 3px solid var(--ink-black); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            background: transparent;
        }
        .shutter-inner { width: 57px; height: 57px; background: var(--ink-black); border-radius: 50%; transition: 0.2s; }
        .shutter-trigger:active .shutter-inner { transform: scale(0.85); background: var(--accent-color); }

        /* --- 3. RESULT SCREEN --- */
        #screen-result { 
            justify-content: center; align-items: center; 
            background: #EAE6DF; flex-direction: row; gap: 4vw; padding: 40px;
        }
        
        .magazine-dispenser {
            height: 85vh; aspect-ratio: 210/297;
            background: #fff; padding: 0; box-shadow: 10px 20px 50px rgba(0,0,0,0.15), -2px -2px 10px rgba(255,255,255,0.5);
            overflow: hidden; position: relative; border-radius: 4px;
        }
        .newspaper-sheet { 
            width: 100%; height: auto; display: block; 
            transform: translateY(105%); 
            transition: transform 2.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .newspaper-sheet.ejected { transform: translateY(0); }

        .editorial-panel {
            width: 360px; display: flex; flex-direction: column; gap: 20px;
            opacity: 0; transform: translateX(20px); transition: all 1s ease 2s;
        }
        .editorial-panel.show { opacity: 1; transform: translateX(0); }

        .log-terminal {
            font-family: var(--font-body); color: var(--ink-light);
            background: #fff; padding: 20px; border: 1px solid rgba(0,0,0,0.05);
            font-size: 0.9rem; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }
        .progress-track { height: 4px; background: var(--bg-paper-dark); width: 100%; margin-top: 12px; position: relative; overflow: hidden; border-radius: 2px;}
        .progress-fill { position: absolute; left:0; top:0; bottom:0; background: var(--ink-black); width: 0%; transition: width 0.2s; }

        .qr-card { 
            background: #fff; padding: 25px; text-align: center; border-radius: 12px;
            display: none; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .qr-card.active { display: block; animation: fadeIn 0.8s ease forwards; }
        .qr-card span { color: var(--ink-black); font-size: 0.9rem; font-weight: 500; display: block; margin-top: 15px; letter-spacing: 1px;}

        .btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .btn-panel {
            padding: 15px; font-family: var(--font-body); font-weight: 500; font-size: 0.95rem;
            cursor: pointer; width: 100%; border-radius: 50px; display: flex; align-items: center; 
            justify-content: center; gap: 10px; border: none; transition: 0.3s;
        }
        .btn-main { background: var(--ink-black); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-main:hover { background: #111; transform: translateY(-2px); }
        .btn-secondary { background: #fff; border: 1px solid rgba(0,0,0,0.1); color: var(--ink-black); }
        .btn-secondary:hover { background: var(--bg-paper); }

        #flash { position: fixed; inset: 0; background: #fff; z-index: 9999; opacity: 0; pointer-events: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 1024px) {
            #screen-result { flex-direction: column; padding: 20px; overflow-y: auto; justify-content: flex-start; }
            .magazine-dispenser { height: 60vh; flex-shrink: 0; margin-bottom: 20px; }
            .editorial-panel { width: 100%; padding-bottom: 40px; }
            .btn-group { flex-direction: row; flex-wrap: wrap; }
            .btn-panel { flex: 1; min-width: 140px; }
        }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <div class="title-masthead">custom frame studio</div>
        <h1 class="main-headline">CANVAS<br>BOOTH</h1>
        <div class="sub-headline">ตู้ถ่ายรูปทรงวาด • บันทึกความทรงจำโทนอุ่น</div>
        <button class="btn-editorial" onclick="OS.startCamera()">Tap to Start</button>
    </div>

    <div id="screen-cam" class="screen">
        <div class="cam-navbar">
            <div class="brand-badge">CANVAS STUDIO</div>
            <div id="clock" style="font-family:var(--font-display-en); color:var(--ink-light); font-weight:600;">00:00</div>
        </div>
        
        <div class="viewport">
            <video id="video-feed" autoplay playsinline muted></video>
            <!-- แสดงกรอบแบบ Overlay ให้เล็งตำแหน่ง -->
            <div class="frame-overlay-preview"></div>
            
            <div id="countdown">3</div> 
            
            <div class="cam-sidebar">
                <div class="btn-circle-tool" onclick="OS.toggleCamFlip()">↻</div>
                <div class="btn-circle-tool" onclick="OS.toggleTimer()" id="btn-timer">3s</div>
                <div class="btn-circle-tool" onclick="OS.toggleMirror()">↔</div>
            </div>
        </div>

        <div class="cam-footer">
            <div class="shutter-trigger" onclick="OS.takePressPhoto()">
                <div class="shutter-inner"></div>
            </div>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <div class="magazine-dispenser">
            <img id="final-img" class="newspaper-sheet" alt="Canvas Print Out">
        </div>

        <div class="editorial-panel" id="res-sidebar">
            <div class="log-terminal">
                <div id="log-text">Processing your masterpiece...</div>
                <div class="progress-track"><div class="progress-fill" id="load-fill"></div></div>
            </div>

            <div class="qr-card" id="qr-box">
                <div id="qrcode" style="display:flex; justify-content:center;"></div>
                <span>SCAN TO DOWNLOAD</span>
            </div>
            
            <div class="btn-group">
                <button class="btn-panel btn-main" onclick="OS.downloadLiveNewspaper()">✧ บันทึกวิดีโอ (Live Photo)</button>
                <button class="btn-panel btn-secondary" onclick="OS.downloadStaticImage()">↓ ดาวน์โหลดภาพนิ่ง</button>
                <button class="btn-panel btn-secondary" style="background:transparent; border:none; text-decoration:underline; color:var(--ink-light);" onclick="location.reload()">กลับไปถ่ายใหม่</button>
            </div>
        </div>
    </div>

    <div id="flash"></div>
    <canvas id="hidden-canvas" style="display:none"></canvas> 

    <script>
        // ==========================================
        // 🎨 ตั้งค่ากรอบและการตกแต่งภาพ 
        // ==========================================
        const CONFIG = {
            // ใส่ชื่อไฟล์รูปภาพกรอบของคุณที่นี่ (ไฟล์ต้องอยู่ในโฟลเดอร์เดียวกัน)
            frameUrl: 'IMG_9405.png', 
            
            // ขนาดของรูปที่ประมวลผลขั้นสุดท้าย (แนะนำให้ตั้งเท่าขนาดไฟล์ IMG_9405.png ของคุณเป๊ะๆ เช่น 1240x1754)
            canvasWidth: 1240,
            canvasHeight: 1754,
            
            // ตำแหน่งภาพถ่ายจากกล้อง 
            // ให้ตั้ง X: 0, Y: 0 และ Width, Height ให้เต็มจอ หากกรอบของคุณเป็นแบบเจาะรูโปร่งใสตรงกลางอยู่แล้ว
            photoX: 0,
            photoY: 0,
            photoWidth: 1240,
            photoHeight: 1754,

            // เปิด/ปิด ฟิลเตอร์โทนอุ่นสไตล์งานวาด (Warm Sketch Filter)
            applySketchFilter: true,
            
            // ImgBB API Key (สำหรับสร้าง QR Code)
            imgbbApiKey: 'ffc90ad0bc5c7e0c056b68ef7430304a'
        };
        // ==========================================

        const OS = (function() {
            let s = { 
                capturedPhoto: null,
                stream: null, 
                processing: false,
                timer: 3,
                facingMode: 'user',
                mirror: true
            };

            const D = {
                screens: { home: document.getElementById('screen-home'), cam: document.getElementById('screen-cam'), res: document.getElementById('screen-result') },
                video: document.getElementById('video-feed'), canvas: document.getElementById('hidden-canvas'), count: document.getElementById('countdown'),
                flash: document.getElementById('flash'), final: document.getElementById('final-img'), btnTimer: document.getElementById('btn-timer')
            };

            const frameImageObj = new Image();
            frameImageObj.crossOrigin = "anonymous";
            frameImageObj.src = CONFIG.frameUrl;
            
            document.documentElement.style.setProperty('--frame-preview', `url('${CONFIG.frameUrl}')`);

            const Aud = {
                ctx: null,
                init() { if(!this.ctx) this.ctx = new (window.AudioContext||window.webkitAudioContext)(); },
                play(freq, type='sine', duration=0.1, vol=0.05) {
                    this.init(); const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
                    o.type = type; o.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    g.gain.setValueAtTime(vol, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                    o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + duration);
                }
            };

            setInterval(() => {
                const d = new Date();
                document.getElementById('clock').innerText = d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0');
            }, 1000);

            function changeScreen(name) {
                Object.values(D.screens).forEach(scr => scr.classList.remove('active'));
                D.screens[name].classList.add('active');
            }

            async function startCamera() {
                Aud.play(523.25, 'triangle', 0.2);
                if(s.stream) s.stream.getTracks().forEach(t=>t.stop());
                try {
                    s.stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: s.facingMode, width: {ideal: 1920}, height: {ideal: 1080} }, audio: false 
                    });
                    D.video.srcObject = s.stream;
                    D.video.style.transform = s.mirror ? "scaleX(-1)" : "scaleX(1)";
                    changeScreen('cam');
                } catch(e) { alert("กรุณาเปิดระบบการเข้าถึงกล้องถ่ายภาพ (Camera Access)"); }
            }

            function toggleCamFlip() { s.facingMode = (s.facingMode === 'user') ? 'environment' : 'user'; startCamera(); }
            function toggleTimer() { const opts = [3, 5, 8]; s.timer = opts[(opts.indexOf(s.timer)+1)%opts.length]; D.btnTimer.innerText = s.timer+"s"; Aud.play(600); }
            function toggleMirror() { s.mirror = !s.mirror; D.video.style.transform = s.mirror ? "scaleX(-1)" : "scaleX(1)"; Aud.play(600); }

            async function takePressPhoto() {
                if(s.processing) return; s.processing = true;
                
                D.count.style.display = 'block';
                for(let i = s.timer; i > 0; i--) {
                    D.count.innerText = i;
                    Aud.play(800, 'sine', 0.1, 0.05);
                    await new Promise(r => setTimeout(r, 1000));
                }
                D.count.style.display = 'none';

                // เสียงชัตเตอร์
                Aud.play(150, 'square', 0.3, 0.3);
                D.flash.style.opacity = '1';
                setTimeout(() => D.flash.style.opacity = '0', 200);

                const tempCvs = document.createElement('canvas');
                tempCvs.width = D.video.videoWidth; tempCvs.height = D.video.videoHeight;
                const tempCtx = tempCvs.getContext('2d');
                if(s.mirror) { tempCtx.translate(tempCvs.width, 0); tempCtx.scale(-1, 1); }
                tempCtx.drawImage(D.video, 0, 0);
                
                s.capturedPhoto = tempCvs;
                renderNewspaperOutput();
            }

            function drawNewspaperCanvas(targetCanvas, photoSourceElement) {
                const ctx = targetCanvas.getContext('2d');
                const w = CONFIG.canvasWidth; const h = CONFIG.canvasHeight;
                
                targetCanvas.width = w; targetCanvas.height = h;

                // พื้นหลังสีครีม (เผื่อรูปไม่เต็ม)
                ctx.fillStyle = '#F7F5F0'; 
                ctx.fillRect(0, 0, w, h);

                // 1. วาดรูปภาพจากกล้อง
                if(photoSourceElement) {
                    const pX = CONFIG.photoX; const pY = CONFIG.photoY;
                    const pW = CONFIG.photoWidth; const pH = CONFIG.photoHeight;

                    ctx.save();
                    ctx.beginPath(); ctx.rect(pX, pY, pW, pH); ctx.clip();
                    
                    const sR = photoSourceElement.width / photoSourceElement.height;
                    const tR = pW / pH;
                    let sx, sy, sw, sh;
                    if(sR > tR) { sh = photoSourceElement.height; sw = sh * tR; sx = (photoSourceElement.width - sw) / 2; sy = 0; } 
                    else { sw = photoSourceElement.width; sh = sw / tR; sx = 0; sy = (photoSourceElement.height - sh) / 2; }
                    
                    ctx.drawImage(photoSourceElement, sx, sy, sw, sh, pX, pY, pW, pH);
                    ctx.restore();

                    // Apply ฟิลเตอร์โทนอุ่นสไตล์งานวาด (Warm Sepia Sketch)
                    if(CONFIG.applySketchFilter) {
                        const imgData = ctx.getImageData(pX, pY, pW, pH);
                        const d = imgData.data;
                        for (let i = 0; i < d.length; i += 4) {
                            let r = d[i], g = d[i+1], b = d[i+2];
                            // สร้างภาพขาวดำที่มีคอนทราสต์สูง
                            let gray = 0.299 * r + 0.587 * g + 0.114 * b;
                            gray = (gray - 128) * 1.15 + 128; // เพิ่ม Contrast
                            
                            // ย้อมสีน้ำตาลอ่อนๆ ให้ดูเป็นกระดาษ/งานวาด (Sepia tint)
                            d[i] = Math.max(0, Math.min(255, gray + 30));     // R
                            d[i+1] = Math.max(0, Math.min(255, gray + 15));   // G
                            d[i+2] = Math.max(0, Math.min(255, gray - 10));   // B
                        }
                        ctx.putImageData(imgData, pX, pY);
                    }
                }

                // 2. วาดกรอบ IMG_9405.png ทับด้านบนสุด
                if(frameImageObj.complete && frameImageObj.src) {
                    ctx.drawImage(frameImageObj, 0, 0, w, h);
                }
            }

            function renderNewspaperOutput() {
                drawNewspaperCanvas(D.canvas, s.capturedPhoto);
                
                const dataUrl = D.canvas.toDataURL('image/jpeg', 0.95);
                D.final.src = dataUrl;
                
                changeScreen('res');
                
                setTimeout(() => { D.final.classList.add('ejected'); }, 300);
                // พลุสีเอิร์ธโทน
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#D4A373', '#2A2826', '#F7F5F0', '#A09C96'] });

                setTimeout(() => {
                    document.getElementById('res-sidebar').classList.add('show');
                    uploadDigitalCopy(dataUrl);
                }, 2200);
            }

            async function uploadDigitalCopy(base64Data) {
                const log = document.getElementById('log-text');
                const fill = document.getElementById('load-fill');
                
                let p = 0;
                const int = setInterval(() => { if(p < 90) p += 5; fill.style.width = p+"%"; }, 100);

                try {
                    const fd = new FormData(); fd.append("image", base64Data.split(',')[1]);
                    log.innerText = "Creating digital cloud link...";
                    
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${CONFIG.imgbbApiKey}`, { method: "POST", body: fd });
                    const resJson = await res.json();
                    
                    clearInterval(int); fill.style.width = "100%";

                    if(resJson.success) {
                        log.innerText = "Ready to download!";
                        document.getElementById('qrcode').innerHTML = "";
                        new QRCode(document.getElementById("qrcode"), {
                            text: resJson.data.url, width: 130, height: 130,
                            colorDark : "#2A2826", colorLight : "#ffffff",
                            correctLevel : QRCode.CorrectLevel.H
                        });
                        document.getElementById('qr-box').classList.add('active');
                    } else { throw new Error(); }
                } catch(e) {
                    clearInterval(int); log.innerText = "Cloud error. Local save available.";
                }
            }

            function downloadStaticImage() {
                const a = document.createElement('a'); a.download = `CanvasBooth_${Date.now()}.jpg`;
                a.href = D.final.src; a.click();
            }

            async function downloadLiveNewspaper() {
                const btn = event.target; const origText = btn.innerText;
                btn.innerText = "⏳ Recording... (7s)"; btn.disabled = true;

                const captureStream = D.canvas.captureStream(30);
                const rec = new MediaRecorder(captureStream, { mimeType: 'video/webm' });
                const chunks = [];
                
                rec.ondataavailable = e => chunks.push(e.data);
                rec.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = `CanvasLive_${Date.now()}.webm`;
                    a.click();
                    
                    drawNewspaperCanvas(D.canvas, s.capturedPhoto);
                    D.final.src = D.canvas.toDataURL('image/jpeg', 0.95);
                    btn.innerText = "✅ Done!";
                    setTimeout(() => { btn.innerText = origText; btn.disabled = false; }, 2000);
                };

                rec.start();
                let startTime = Date.now();

                const liveLoop = setInterval(() => {
                    drawNewspaperCanvas(D.canvas, D.video);
                    D.final.src = D.canvas.toDataURL('image/jpeg', 0.7);

                    if (Date.now() - startTime >= 7000) { 
                        clearInterval(liveLoop); rec.stop();
                    }
                }, 40);
            }

            return { startCamera, toggleCamFlip, toggleTimer, toggleMirror, takePressPhoto, downloadStaticImage, downloadLiveNewspaper };
        })();
    </script>
</body>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CANVAS STUDIO | ตู้ถ่ายรูปทรงวาด</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- 📌 เพิ่มไลบรารี jsPDF สำหรับแปลงภาพเป็น PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Playfair+Display:ital,wght@0,600;1,600&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* 📌 โทนสีใหม่สไตล์ทรงวาดวินเทจ */
            --bg-paper: #F2EBE1;          /* สีครีมกระดาษเก่า */
            --bg-paper-dark: #DFD6C8;     /* สีเงากระดาษ */
            --ink-black: #2C2621;         /* สีน้ำตาลเข้ม/ดำหมึกพิมพ์ */
            --ink-light: #7A6F64;         /* สีเทาอมน้ำตาล */
            --accent-color: #9C3D2B;      /* สีแดงอิฐ/ศาลเจ้า */
            --retro-green: #294038;       /* สีเขียวประตูบานเฟี้ยมวินเทจ */
            
            --font-display-en: 'Playfair Display', serif;
            --font-handwriting: 'Caveat', cursive;
            --font-body: 'Prompt', sans-serif;
            --font-mono: 'Courier New', Courier, monospace; /* ฟอนต์สลิปใบเสร็จ */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            margin: 0; padding: 0; background: var(--bg-paper);
            height: 100vh; height: 100dvh; width: 100vw; overflow: hidden;
            color: var(--ink-black); font-family: var(--font-body);
            display: flex; justify-content: center; align-items: center;
        }

        body::before {
            content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 999;
            opacity: 0.5; mix-blend-mode: multiply;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.12'/%3E%3C/svg%3E");
        }

        .screen {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            opacity: 0; pointer-events: none;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1); z-index: 10;
        }
        .screen.active { opacity: 1; pointer-events: auto; }

        /* --- 1. HOME SCREEN --- */
        #screen-home { 
            justify-content: center; align-items: center; text-align: center;
            background: radial-gradient(circle at center, #F8F3EC 0%, #E6DBC9 100%);
        }
        .title-masthead {
            font-family: var(--font-handwriting); font-weight: 600;
            font-size: clamp(1.8rem, 4vw, 2.5rem); color: var(--accent-color);
            letter-spacing: 2px; margin-bottom: 5px; transform: rotate(-3deg);
        }
        .main-headline {
            font-family: var(--font-display-en); font-size: clamp(3.5rem, 9vw, 6rem);
            color: var(--retro-green); margin: 0; line-height: 1; letter-spacing: 2px;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.1), -1px -1px 0px rgba(255,255,255,0.7); /* เอฟเฟกต์ป้ายสามมิติเก่าๆ */
        }
        .sub-headline {
            font-family: var(--font-body); font-weight: 400; font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--accent-color); margin-top: 15px; margin-bottom: 50px; letter-spacing: 2px;
            padding: 5px 15px; border-top: 1px solid var(--accent-color); border-bottom: 1px solid var(--accent-color);
        }
        .btn-editorial {
            background: #F8F3EC; border: 2px solid var(--retro-green); color: var(--retro-green);
            padding: 15px 40px; font-size: 1.1rem; border-radius: 4px; cursor: pointer;
            transition: all 0.2s ease; font-family: var(--font-body); font-weight: 600;
            letter-spacing: 3px; text-transform: uppercase;
            box-shadow: 4px 4px 0px var(--retro-green); /* เงาแข็งสไตล์วินเทจ */
        }
        .btn-editorial:hover { 
            background: var(--retro-green); color: #F8F3EC; 
            transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--retro-green);
        }
        .btn-editorial:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px var(--retro-green); }

        /* --- 2. CAMERA SCREEN --- */
        #screen-cam { background: #1a1817; } 
        
        .cam-navbar {
            height: 70px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; background: var(--retro-green);
            border-bottom: 3px solid var(--ink-black); z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .brand-badge { font-family: var(--font-display-en); color: #F2EBE1; font-size: 1.2rem; font-weight: 600; letter-spacing: 2px; }

        .viewport { 
            flex: 1; position: relative; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            padding: 20px 0; background: radial-gradient(circle, #2b2b2b 0%, #111 100%);
        }
        
        .live-preview-wrapper {
            position: relative; height: 100%; aspect-ratio: 1240 / 1754;
            background: #fff; box-shadow: 0 10px 40px rgba(0,0,0,0.5); overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        video#video-feed { 
            position: absolute; top: 21.66%; left: 5.64%; width: 88.71%; height: 44.47%; 
            object-fit: cover; transform: scaleX(-1); z-index: 1; background: #000;
            filter: sepia(0.2) contrast(1.1); /* ย้อมสีวิดีโอให้ดูอุ่นขึ้นนิดนึงตอนถ่าย */
        }

        img.overlay-frame {
            position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; 
        }

        .cam-sidebar {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 50;
        }
        .btn-circle-tool {
            width: 50px; height: 50px; background: #E6DBC9; 
            border: 2px solid var(--ink-black); border-radius: 8px; color: var(--ink-black);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer; transition: 0.2s; 
            box-shadow: 2px 2px 0px var(--ink-black); font-family: var(--font-display-en); font-weight: bold;
        }
        .btn-circle-tool:hover { background: var(--accent-color); color: #fff; }
        .btn-circle-tool:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--ink-black); }

        #countdown {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            font-size: 8rem; font-family: var(--font-display-en); color: #F2EBE1; display: none;
            text-shadow: 3px 3px 0px var(--accent-color), 0 0 30px rgba(0,0,0,0.8); z-index: 100; font-weight: 600;
        }

        .cam-footer {
            height: 120px; background: #26221F; /* สีบอดี้กล้อง */
            display: flex; align-items: center; justify-content: center; z-index: 20;
            border-top: 4px solid #141210; box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px); /* ลายหนังกล้อง */
        }
        .shutter-trigger {
            width: 80px; height: 80px; background: #D9D9D9;
            border: 4px solid #A3A3A3; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
            box-shadow: inset 0 2px 5px #fff, 0 5px 15px rgba(0,0,0,0.5); /* ปุ่มชัตเตอร์เหล็ก */
        }
        .shutter-inner { 
            width: 60px; height: 60px; background: var(--accent-color); 
            border-radius: 50%; transition: 0.1s; border: 2px solid #6E2619;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.3);
        }
        .shutter-trigger:active .shutter-inner { transform: scale(0.9); background: #7A2D1F; }

        /* --- 3. RESULT SCREEN --- */
        #screen-result { 
            justify-content: center; align-items: center; 
            background: radial-gradient(circle, var(--bg-paper) 0%, var(--bg-paper-dark) 100%);
            flex-direction: row; gap: 4vw; padding: 40px;
        }
        
        .magazine-dispenser {
            height: 85vh; aspect-ratio: 210/297;
            background: #fff; padding: 0; box-shadow: 15px 25px 40px rgba(0,0,0,0.2), 0 0 0 1px rgba(0,0,0,0.05);
            overflow: hidden; position: relative; border-radius: 2px;
        }
        .newspaper-sheet { 
            width: 100%; height: auto; display: block; 
            transform: translateY(105%); 
            transition: transform 2.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .newspaper-sheet.ejected { transform: translateY(0); }

        .editorial-panel {
            width: 360px; display: flex; flex-direction: column; gap: 20px;
            opacity: 0; transform: translateX(20px); transition: all 1s ease 2s;
        }
        .editorial-panel.show { opacity: 1; transform: translateX(0); }

        .log-terminal {
            font-family: var(--font-mono); color: var(--ink-black);
            background: #F8F5F0; padding: 20px; border: 1px dashed #A59B8E; /* สไตล์ใบเสร็จ */
            font-size: 0.85rem; border-radius: 2px; box-shadow: 2px 2px 0px rgba(0,0,0,0.05);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .progress-track { height: 6px; background: #E6DBC9; width: 100%; margin-top: 12px; position: relative; overflow: hidden; border: 1px solid var(--ink-black);}
        .progress-fill { position: absolute; left:0; top:0; bottom:0; background: var(--accent-color); width: 0%; transition: width 0.2s; }

        .qr-card { 
            background: #F8F5F0; padding: 20px; text-align: center; border-radius: 4px;
            display: none; border: 2px solid var(--ink-black); box-shadow: 4px 4px 0px var(--ink-black); /* สไตล์กรอบตั๋ว */
        }
        .qr-card.active { display: block; animation: fadeIn 0.8s ease forwards; }
        .qr-card span { color: var(--ink-black); font-size: 0.9rem; font-weight: 600; display: block; margin-top: 15px; letter-spacing: 1px;}
        #qrcode { background: #fff; padding: 10px; border: 1px solid var(--ink-black); border-radius: 4px; display:inline-block !important; margin: 0 auto;}

        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .btn-panel {
            padding: 15px; font-family: var(--font-body); font-weight: 600; font-size: 0.95rem;
            cursor: pointer; width: 100%; border-radius: 4px; display: flex; align-items: center; 
            justify-content: center; gap: 10px; border: 2px solid var(--ink-black); transition: 0.2s;
            box-shadow: 3px 3px 0px var(--ink-black); letter-spacing: 1px;
        }
        .btn-main { background: var(--retro-green); color: #F2EBE1; border-color: var(--retro-green); box-shadow: 3px 3px 0px #111A16;}
        .btn-main:hover { background: #1F3029; transform: translate(2px, 2px); box-shadow: 1px 1px 0px #111A16; }
        .btn-secondary { background: #F8F3EC; color: var(--ink-black); }
        .btn-secondary:hover { background: #E6DBC9; transform: translate(2px, 2px); box-shadow: 1px 1px 0px var(--ink-black); }

        #flash { position: fixed; inset: 0; background: #F2EBE1; z-index: 9999; opacity: 0; pointer-events: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 1024px) {
            #screen-result { flex-direction: column; padding: 20px; overflow-y: auto; justify-content: flex-start; }
            .magazine-dispenser { height: 60vh; flex-shrink: 0; margin-bottom: 20px; }
            .editorial-panel { width: 100%; padding-bottom: 40px; }
            .btn-group { flex-direction: row; flex-wrap: wrap; }
            .btn-panel { flex: 1; min-width: 140px; }
        }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <div class="title-masthead">custom frame studio</div>
        <h1 class="main-headline">CANVAS<br>BOOTH</h1>
        <div class="sub-headline">ตู้ถ่ายรูปทรงวาด • บันทึกความทรงจำโทนอุ่น</div>
        <button class="btn-editorial" onclick="OS.startCamera()">Tap to Start</button>
    </div>

    <div id="screen-cam" class="screen">
        <div class="cam-navbar">
            <div class="brand-badge">CANVAS STUDIO</div>
            <div id="clock" style="font-family:var(--font-mono); color:#A5BDB2; font-weight:600;">00:00</div>
        </div>
        
        <div class="viewport">
            <div class="live-preview-wrapper">
                <video id="video-feed" autoplay playsinline muted></video>
                <img id="preview-overlay" class="overlay-frame" src="IMG_9405.png" alt="frame">
                <!-- 📌 จุดแก้ไขที่ 1: เปลี่ยนตัวเลขเริ่มต้นบนหน้าจอเป็น 8 -->
                <div id="countdown">8</div>
            </div>
            
            <div class="cam-sidebar">
                <div class="btn-circle-tool" onclick="OS.toggleCamFlip()">↻</div>
                <!-- 📌 จุดแก้ไขที่ 2: เปลี่ยนข้อความปุ่มตัวเลือกเป็น 8s -->
                <div class="btn-circle-tool" onclick="OS.toggleTimer()" id="btn-timer">8s</div>
                <div class="btn-circle-tool" onclick="OS.toggleMirror()">↔</div>
            </div>
        </div>

        <div class="cam-footer">
            <div class="shutter-trigger" onclick="OS.takePressPhoto()">
                <div class="shutter-inner"></div>
            </div>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <div class="magazine-dispenser">
            <img id="final-img" class="newspaper-sheet" alt="Canvas Print Out">
        </div>

        <div class="editorial-panel" id="res-sidebar">
            <div class="log-terminal">
                <div id="log-text">Processing your masterpiece...</div>
                <div class="progress-track"><div class="progress-fill" id="load-fill"></div></div>
            </div>

            <div class="qr-card" id="qr-box">
                <div id="qrcode"></div>
                <span>SCAN TO DOWNLOAD</span>
            </div>
            
            <div class="btn-group">
                <button class="btn-panel btn-main" onclick="OS.downloadLiveNewspaper()">✧ บันทึก Live Photo</button>
                <button class="btn-panel btn-secondary" onclick="OS.downloadStaticImage()">↓ ดาวน์โหลดภาพนิ่ง</button>
                <!-- 📌 เพิ่มปุ่มปริ้น PDF ตรงนี้ -->
                <button class="btn-panel btn-secondary" onclick="OS.printToPDF()">🖨️ ปริ้นเป็นไฟล์ PDF</button>
                <button class="btn-panel btn-secondary" style="background:transparent; border:none; box-shadow:none; text-decoration:underline; color:var(--ink-light); margin-top:5px;" onclick="location.reload()">กลับไปถ่ายใหม่</button>
            </div>
        </div>
    </div>

    <div id="flash"></div>
    <canvas id="hidden-canvas" style="display:none"></canvas> 

    <script>
        const CONFIG = {
            frameUrl: 'IMG_9405.png', 
            canvasWidth: 1240,
            canvasHeight: 1754,
            photoX: 70,        
            photoY: 380,       
            photoWidth: 1100,  
            photoHeight: 780,  
            applySketchFilter: true,
            imgbbApiKey: 'ffc90ad0bc5c7e0c056b68ef7430304a'
        };

        document.getElementById('preview-overlay').src = CONFIG.frameUrl;

        const OS = (function() {
            let s = { 
                capturedPhoto: null,
                stream: null, 
                processing: false,
                // 📌 จุดแก้ไขที่ 3: เปลี่ยนค่าเริ่มต้นของตัวนับเวลาทำงานจริงเป็น 8 วินาที
                timer: 8,
                facingMode: 'user',
                mirror: true
            };

            const D = {
                screens: { home: document.getElementById('screen-home'), cam: document.getElementById('screen-cam'), res: document.getElementById('screen-result') },
                video: document.getElementById('video-feed'), canvas: document.getElementById('hidden-canvas'), count: document.getElementById('countdown'),
                flash: document.getElementById('flash'), final: document.getElementById('final-img'), btnTimer: document.getElementById('btn-timer')
            };

            const frameImageObj = new Image();
            frameImageObj.crossOrigin = "anonymous";
            frameImageObj.src = CONFIG.frameUrl;

            const Aud = {
                ctx: null,
                init() { if(!this.ctx) this.ctx = new (window.AudioContext||window.webkitAudioContext)(); },
                play(freq, type='sine', duration=0.1, vol=0.05) {
                    this.init(); const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
                    o.type = type; o.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    g.gain.setValueAtTime(vol, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                    o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + duration);
                }
            };

            setInterval(() => {
                const d = new Date();
                document.getElementById('clock').innerText = d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0');
            }, 1000);

            function changeScreen(name) {
                Object.values(D.screens).forEach(scr => scr.classList.remove('active'));
                D.screens[name].classList.add('active');
            }

            async function startCamera() {
                Aud.play(523.25, 'triangle', 0.2);
                if(s.stream) s.stream.getTracks().forEach(t=>t.stop());
                try {
                    s.stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: s.facingMode, width: {ideal: 1240}, height: {ideal: 1240} }, audio: false 
                    });
                    D.video.srcObject = s.stream;
                    D.video.style.transform = s.mirror ? "scaleX(-1)" : "scaleX(1)";
                    changeScreen('cam');
                } catch(e) { alert("กรุณาเปิดระบบการเข้าถึงกล้องถ่ายภาพ (Camera Access)"); }
            }

            function toggleCamFlip() { s.facingMode = (s.facingMode === 'user') ? 'environment' : 'user'; startCamera(); }
            function toggleTimer() { const opts = [3, 5, 8]; s.timer = opts[(opts.indexOf(s.timer)+1)%opts.length]; D.btnTimer.innerText = s.timer+"s"; Aud.play(600); }
            function toggleMirror() { s.mirror = !s.mirror; D.video.style.transform = s.mirror ? "scaleX(-1)" : "scaleX(1)"; Aud.play(600); }

            async function takePressPhoto() {
                if(s.processing) return; s.processing = true;
                
                D.count.style.display = 'block';
                for(let i = s.timer; i > 0; i--) {
                    D.count.innerText = i;
                    Aud.play(800, 'sine', 0.1, 0.05);
                    await new Promise(r => setTimeout(r, 1000));
                }
                D.count.style.display = 'none';

                Aud.play(150, 'square', 0.3, 0.3);
                D.flash.style.opacity = '1';
                setTimeout(() => D.flash.style.opacity = '0', 200);

                const tempCvs = document.createElement('canvas');
                tempCvs.width = D.video.videoWidth; tempCvs.height = D.video.videoHeight;
                const tempCtx = tempCvs.getContext('2d');
                if(s.mirror) { tempCtx.translate(tempCvs.width, 0); tempCtx.scale(-1, 1); }
                tempCtx.drawImage(D.video, 0, 0);
                
                s.capturedPhoto = tempCvs;
                renderNewspaperOutput();
            }

            function drawNewspaperCanvas(targetCanvas, photoSourceElement) {
                const ctx = targetCanvas.getContext('2d');
                const w = CONFIG.canvasWidth; const h = CONFIG.canvasHeight;
                
                targetCanvas.width = w; targetCanvas.height = h;

                ctx.fillStyle = '#F7F5F0'; 
                ctx.fillRect(0, 0, w, h);

                if(photoSourceElement) {
                    const pX = CONFIG.photoX; const pY = CONFIG.photoY;
                    const pW = CONFIG.photoWidth; const pH = CONFIG.photoHeight;

                    ctx.save();
                    ctx.beginPath(); ctx.rect(pX, pY, pW, pH); ctx.clip();
                    
                    const sR = photoSourceElement.width / photoSourceElement.height;
                    const tR = pW / pH;
                    let sx, sy, sw, sh;
                    if(sR > tR) { sh = photoSourceElement.height; sw = sh * tR; sx = (photoSourceElement.width - sw) / 2; sy = 0; } 
                    else { sw = photoSourceElement.width; sh = sw / tR; sx = 0; sy = (photoSourceElement.height - sh) / 2; }
                    
                    ctx.drawImage(photoSourceElement, sx, sy, sw, sh, pX, pY, pW, pH);
                    ctx.restore();

                    if(CONFIG.applySketchFilter) {
                        const imgData = ctx.getImageData(pX, pY, pW, pH);
                        const d = imgData.data;
                        for (let i = 0; i < d.length; i += 4) {
                            let r = d[i], g = d[i+1], b = d[i+2];
                            let gray = 0.299 * r + 0.587 * g + 0.114 * b;
                            gray = (gray - 128) * 1.15 + 128; 
                            
                            d[i] = Math.max(0, Math.min(255, gray + 30));     
                            d[i+1] = Math.max(0, Math.min(255, gray + 15));   
                            d[i+2] = Math.max(0, Math.min(255, gray - 10));   
                        }
                        ctx.putImageData(imgData, pX, pY);
                    }
                }

                if(frameImageObj.complete && frameImageObj.src) {
                    ctx.drawImage(frameImageObj, 0, 0, w, h);
                }
            }

            function renderNewspaperOutput() {
                drawNewspaperCanvas(D.canvas, s.capturedPhoto);
                
                const dataUrl = D.canvas.toDataURL('image/jpeg', 0.95);
                D.final.src = dataUrl;
                
                changeScreen('res');
                
                setTimeout(() => { D.final.classList.add('ejected'); }, 300);
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#9C3D2B', '#294038', '#E6DBC9'] });

                setTimeout(() => {
                    document.getElementById('res-sidebar').classList.add('show');
                    uploadDigitalCopy(dataUrl);
                }, 2200);
            }

            async function uploadDigitalCopy(base64Data) {
                const log = document.getElementById('log-text');
                const fill = document.getElementById('load-fill');
                
                let p = 0;
                const int = setInterval(() => { if(p < 90) p += 5; fill.style.width = p+"%"; }, 100);

                try {
                    const fd = new FormData(); fd.append("image", base64Data.split(',')[1]);
                    log.innerText = "Creating digital cloud link...";
                    
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${CONFIG.imgbbApiKey}`, { method: "POST", body: fd });
                    const resJson = await res.json();
                    
                    clearInterval(int); fill.style.width = "100%";

                    if(resJson.success) {
                        log.innerText = "Ready to download!";
                        document.getElementById('qrcode').innerHTML = "";
                        new QRCode(document.getElementById("qrcode"), {
                            text: resJson.data.url, width: 130, height: 130,
                            colorDark : "#2C2621", colorLight : "#ffffff",
                            correctLevel : QRCode.CorrectLevel.H
                        });
                        document.getElementById('qr-box').classList.add('active');
                    } else { throw new Error(); }
                } catch(e) {
                    clearInterval(int); log.innerText = "Cloud error. Local save available.";
                }
            }

            function downloadStaticImage() {
                const a = document.createElement('a'); a.download = `CanvasBooth_${Date.now()}.jpg`;
                a.href = D.final.src; a.click();
            }

            // 📌 ฟังก์ชันสำหรับเจนและสั่งปริ้นเป็นไฟล์ PDF ขนาดกระดาษ A4
            function printToPDF() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'mm', 'a4');
                doc.addImage(D.final.src, 'JPEG', 0, 0, 210, 297);
                doc.save(`CanvasBooth_${Date.now()}.pdf`);
            }

            async function downloadLiveNewspaper() {
                const btn = event.target; const origText = btn.innerText;
                btn.innerText = "⏳ Recording... (7s)"; btn.disabled = true;

                const captureStream = D.canvas.captureStream(30);
                const rec = new MediaRecorder(captureStream, { mimeType: 'video/webm' });
                const chunks = [];
                
                rec.ondataavailable = e => chunks.push(e.data);
                rec.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = `CanvasLive_${Date.now()}.webm`;
                    a.click();
                    
                    drawNewspaperCanvas(D.canvas, s.capturedPhoto);
                    D.final.src = D.canvas.toDataURL('image/jpeg', 0.95);
                    btn.innerText = "✅ Done!";
                    setTimeout(() => { btn.innerText = origText; btn.disabled = false; }, 2000);
                };

                rec.start();
                let startTime = Date.now();

                const liveLoop = setInterval(() => {
                    drawNewspaperCanvas(D.canvas, D.video);
                    D.final.src = D.canvas.toDataURL('image/jpeg', 0.7);

                    if (Date.now() - startTime >= 7000) { 
                        clearInterval(liveLoop); rec.stop();
                    }
                }, 40);
            }

            // 📌 ทำการส่งออกฟังก์ชัน printToPDF ออกไปด้วย
            return { startCamera, toggleCamFlip, toggleTimer, toggleMirror, takePressPhoto, downloadStaticImage, printToPDF, downloadLiveNewspaper };
        })();
    </script>
</body>

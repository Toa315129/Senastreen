<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ทรงเสนา DAILY | Premium Newspaper Photobooth</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Editorial & Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chonburi&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Luxury Paper & Ink Palette */
            --bg-dark: #0f0e0c;
            --paper-cream: #f5f2e9;
            --ink-black: #1a1917;
            --ink-muted: #5e5a52;
            --gold-accent: #c5a880;
            
            --font-display-th: 'Chonburi', serif;
            --font-display-en: 'Playfair Display', serif;
            --font-body: 'Sarabun', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            height: 100vh; height: 100dvh; width: 100vw;
            overflow: hidden;
            color: #fff;
            font-family: var(--font-body);
            display: flex; justify-content: center; align-items: center;
        }

        /* Ambient subtle grain overlay */
        body::before {
            content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 999;
            opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            opacity: 0; pointer-events: none;
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10;
        }
        .screen.active { opacity: 1; pointer-events: auto; }

        /* --- 1. HOME SCREEN --- */
        #screen-home { 
            justify-content: center; align-items: center; text-align: center;
            background: radial-gradient(circle, #221e17 0%, #0f0e0c 100%);
        }
        
        .title-masthead {
            font-family: var(--font-display-en); font-weight: 700;
            font-size: clamp(1rem, 3vw, 1.5rem); color: var(--gold-accent);
            letter-spacing: 4px; margin-bottom: 10px; text-transform: uppercase;
        }
        
        .main-headline {
            font-family: var(--font-display-th);
            font-size: clamp(3.5rem, 9vw, 6.5rem);
            color: var(--paper-cream); margin: 0; line-height: 1.2;
        }
        
        .sub-headline {
            font-family: var(--font-body); font-weight: 300;
            font-size: clamp(1.1rem, 2.5vw, 1.6rem);
            color: #a49e92; margin-top: 15px; margin-bottom: 50px;
            letter-spacing: 1px;
        }

        .btn-editorial {
            background: transparent; border: 1px solid var(--gold-accent);
            color: var(--paper-cream); padding: 16px 45px;
            font-size: 1.1rem; border-radius: 0; cursor: pointer;
            transition: all 0.4s ease; font-family: var(--font-body);
            letter-spacing: 2px; text-transform: uppercase;
        }
        .btn-editorial:hover { background: var(--paper-cream); color: var(--ink-black); border-color: var(--paper-cream); }
        .btn-editorial:active { transform: scale(0.97); }

        /* --- 2. CAMERA SCREEN --- */
        #screen-cam { background: #000; }
        
        .cam-navbar {
            height: 70px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; background: rgba(15, 14, 12, 0.95);
            border-bottom: 1px solid #2d2a24; z-index: 20;
        }
        .brand-badge { font-family: var(--font-display-th); color: var(--gold-accent); font-size: 1.3rem; }

        .viewport { flex: 1; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        video#video-feed { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); filter: grayscale(100%) contrast(1.15) brightness(0.95); }
        
        /* Interactive Overlay on Camera to preview the Newspaper layout */
        .cam-overlay-grid {
            position: absolute; inset: 0; pointer-events: none;
            border: 40px solid rgba(15, 14, 12, 0.5);
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px;
        }
        .cam-guide-text {
            align-self: center; background: rgba(0,0,0,0.7); padding: 6px 16px;
            font-size: 0.85rem; letter-spacing: 1px; color: var(--gold-accent); border: 1px solid var(--gold-accent);
        }

        .cam-sidebar {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 18px; z-index: 50;
        }
        .btn-circle-tool {
            width: 50px; height: 50px; background: rgba(26, 25, 23, 0.85); 
            border: 1px solid rgba(197, 168, 128, 0.4); border-radius: 50%; color: var(--paper-cream);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; cursor: pointer; transition: 0.3s;
        }
        .btn-circle-tool:hover { border-color: var(--gold-accent); color: var(--gold-accent); }

        #countdown {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            font-size: 9rem; font-family: var(--font-display-en); color: var(--gold-accent); display: none;
            text-shadow: 0 4px 20px rgba(0,0,0,0.7); z-index: 100; font-weight: bold;
        }

        .cam-footer {
            height: 130px; background: rgba(15, 14, 12, 0.95);
            display: flex; align-items: center; justify-content: center; z-index: 20;
            border-top: 1px solid #2d2a24;
        }
        .shutter-trigger {
            width: 75px; height: 75px; border: 2px solid var(--gold-accent); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .shutter-inner { width: 61px; height: 61px; background: var(--paper-cream); border-radius: 50%; transition: 0.2s; }
        .shutter-trigger:active .shutter-inner { transform: scale(0.9); background: var(--gold-accent); }

        /* --- 3. RESULT SCREEN --- */
        #screen-result { 
            justify-content: center; align-items: center; 
            background: #141311; flex-direction: row; gap: 5vw; padding: 40px;
        }
        
        .magazine-dispenser {
            height: 82vh; aspect-ratio: 210/297; /* Perfect A4 Ratio */
            background: #090908; padding: 5px; box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            overflow: hidden; position: relative; border: 1px solid #282520;
        }
        .newspaper-sheet { 
            width: 100%; height: auto; display: block; 
            transform: translateY(105%); 
            transition: transform 3.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .newspaper-sheet.ejected { transform: translateY(0); }

        .editorial-panel {
            width: 350px; display: flex; flex-direction: column; gap: 24px;
            opacity: 0; transform: translateX(20px); transition: all 1s ease 2.5s;
        }
        .editorial-panel.show { opacity: 1; transform: translateX(0); }

        .log-terminal {
            font-family: var(--font-body); color: var(--gold-accent);
            background: #1c1a17; padding: 20px; border: 1px solid #2d2a24;
            font-size: 0.9rem; border-radius: 4px;
        }
        .progress-track { height: 2px; background: #2d2a24; width: 100%; margin-top: 12px; position: relative; overflow: hidden; }
        .progress-fill { position: absolute; left:0; top:0; bottom:0; background: var(--gold-accent); width: 0%; transition: width 0.2s; }

        .qr-card { 
            background: var(--paper-cream); padding: 20px; text-align: center; 
            display: none; border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .qr-card.active { display: block; animation: fadeIn 0.6s ease forwards; }
        .qr-card span { color: var(--ink-black); font-size: 0.85rem; font-weight: 600; display: block; margin-top: 10px;}

        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .btn-panel {
            padding: 14px; font-family: var(--font-body); font-weight: 600; font-size: 0.95rem;
            cursor: pointer; width: 100%; border-radius: 4px; display: flex; align-items: center; 
            justify-content: center; gap: 10px; border: none; transition: 0.3s;
        }
        .btn-main { background: var(--gold-accent); color: var(--ink-black); }
        .btn-main:hover { background: var(--paper-cream); }
        .btn-secondary { background: #26231f; border: 1px solid #3d3830; color: var(--paper-cream); }
        .btn-secondary:hover { background: #332f2a; }

        #flash { position: fixed; inset: 0; background: #fff; z-index: 9999; opacity: 0; pointer-events: none; }
        
        @media (max-width: 1024px) {
            #screen-result { flex-direction: column; padding: 20px; overflow-y: auto; justify-content: flex-start; }
            .magazine-dispenser { height: 52vh; flex-shrink: 0; margin-bottom: 20px; }
            .editorial-panel { width: 100%; padding-bottom: 40px; }
            .btn-group { flex-direction: row; flex-wrap: wrap; }
            .btn-panel { flex: 1; min-width: 140px; }
        }
    </style>
</head>
<body>

    <!-- 1. Home Masthead Screen -->
    <div id="screen-home" class="screen active">
        <div class="title-masthead">Special Memorial Edition</div>
        <h1 class="main-headline">ทรงเสนา DAILY</h1>
        <div class="sub-headline">บันทึกประวัติศาสตร์แห่งเกียรติภูมิ • ตะกั่วป่าเสนานุกูล</div>
        <button class="btn-editorial" onclick="OS.startCamera()">Enter Studio</button>
    </div>

    <!-- 2. Interactive Press Camera Screen -->
    <div id="screen-cam" class="screen">
        <div class="cam-navbar">
            <div class="brand-badge">ทรงเสนา PRESS</div>
            <div id="clock" style="font-family:var(--font-display-en); color:var(--gold-accent); letter-spacing: 1px;">00:00</div>
        </div>
        
        <div class="viewport">
            <video id="video-feed" autoplay playsinline muted></video>
            <div id="countdown">3</div> 
            
            <div class="cam-overlay-grid">
                <div class="cam-guide-text">PORTRAIT FRAMING AREA</div>
            </div>
            
            <div class="cam-sidebar">
                <div class="btn-circle-tool" onclick="OS.toggleCamFlip()">↻</div>
                <div class="btn-circle-tool" onclick="OS.toggleTimer()" id="btn-timer">3s</div>
                <div class="btn-circle-tool" onclick="OS.toggleMirror()">↔</div>
            </div>
        </div>

        <div class="cam-footer">
            <div class="shutter-trigger" onclick="OS.takePressPhoto()">
                <div class="shutter-inner"></div>
            </div>
        </div>
    </div>

    <!-- 3. Classic Editorial Result Screen -->
    <div id="screen-result" class="screen">
        <div class="magazine-dispenser">
            <img id="final-img" class="newspaper-sheet" alt="Newspaper Print Out">
        </div>

        <div class="editorial-panel" id="res-sidebar">
            <div class="log-terminal">
                <div id="log-text">> Printing Archive Copy...</div>
                <div class="progress-track"><div class="progress-fill" id="load-fill"></div></div>
            </div>

            <div class="qr-card" id="qr-box">
                <div id="qrcode" style="display:flex; justify-content:center;"></div>
                <span>SCAN TO DOWNLOAD DIGITAL PRESS</span>
            </div>
            
            <div class="btn-group">
                <button class="btn-panel btn-main" onclick="OS.downloadStaticImage()">📥 ดาวน์โหลดภาพนิ่ง (A4)</button>
                <button class="btn-panel btn-secondary" style="opacity:0.6;" onclick="location.reload()">เสร็จสิ้น / ออกแบบใหม่</button>
            </div>
        </div>
    </div>

    <div id="flash"></div>
    <canvas id="hidden-canvas" style="display:none"></canvas> 

    <script>
        const OS = (function() {
            // ImgBB API Key
            const API_KEY = 'ffc90ad0bc5c7e0c056b68ef7430304a'; 

            // Configuration for A4 Newspaper Grid Layout
            const C = {
                w: 1240,
                h: 1754, // Standard A4 Dimensions at high res
            };

            let s = { 
                capturedPhoto: null,
                stream: null, 
                processing: false,
                timer: 3,
                facingMode: 'user',
                mirror: true
            };

            const D = {
                screens: { home: document.getElementById('screen-home'), cam: document.getElementById('screen-cam'), res: document.getElementById('screen-result') },
                video: document.getElementById('video-feed'), canvas: document.getElementById('hidden-canvas'), count: document.getElementById('countdown'),
                flash: document.getElementById('flash'), final: document.getElementById('final-img'), btnTimer: document.getElementById('btn-timer')
            };

            // Audio Subsystem
            const Aud = {
                ctx: null,
                init() { if(!this.ctx) this.ctx = new (window.AudioContext||window.webkitAudioContext)(); },
                play(freq, type='sine', duration=0.15, vol=0.1) {
                    this.init(); const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
                    o.type = type; o.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    g.gain.setValueAtTime(vol, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                    o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + duration);
                }
            };

            // Real-time Clock running in background
            setInterval(() => {
                const d = new Date();
                document.getElementById('clock').innerText = d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0') + " น.";
            }, 1000);

            function changeScreen(name) {
                Object.values(D.screens).forEach(scr => scr.classList.remove('active'));
                D.screens[name].classList.add('active');
            }

            async function startCamera() {
                Aud.play(523.25, 'triangle', 0.2);
                if(s.stream) s.stream.getTracks().forEach(t=>t.stop());
                try {
                    s.stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: s.facingMode, width: {ideal: 1920}, height: {ideal: 1080} }, audio: false 
                    });
                    D.video.srcObject = s.stream;
                    D.video.style.transform = s.mirror ? "scaleX(-1)" : "scaleX(1)";
                    changeScreen('cam');
                } catch(e) { alert("กรุณาเปิดระบบการเข้าถึงกล้องถ่ายภาพ"); }
            }

            function toggleCamFlip() { s.facingMode = (s.facingMode === 'user') ? 'environment' : 'user'; startCamera(); }
            function toggleTimer() { const opts = [3, 5, 8]; s.timer = opts[(opts.indexOf(s.timer)+1)%opts.length]; D.btnTimer.innerText = s.timer+"s"; Aud.play(440); }
            function toggleMirror() { s.mirror = !s.mirror; D.video.style.transform = s.mirror ? "scaleX(-1)" : "scaleX(1)"; Aud.play(440); }

            async function takePressPhoto() {
                if(s.processing) return; s.processing = true;
                
                // Countdown flow
                D.count.style.display = 'block';
                for(let i = s.timer; i > 0; i--) {
                    D.count.innerText = i;
                    Aud.play(659.25, 'sine', 0.1, 0.05);
                    await new Promise(r => setTimeout(r, 1000));
                }
                D.count.style.display = 'none';

                // Flash & Shutter effect
                Aud.play(150, 'square', 0.3, 0.4);
                D.flash.style.opacity = '1';
                setTimeout(() => D.flash.style.opacity = '0', 150);

                // Capture Frame from Video Stream
                const tempCvs = document.createElement('canvas');
                tempCvs.width = D.video.videoWidth; tempCvs.height = D.video.videoHeight;
                const tempCtx = tempCvs.getContext('2d');
                if(s.mirror) { tempCtx.translate(tempCvs.width, 0); tempCtx.scale(-1, 1); }
                tempCtx.drawImage(D.video, 0, 0);
                
                s.capturedPhoto = tempCvs;
                renderNewspaperOutput();
            }

            // High-End Newspaper Renderer Engine
            function drawNewspaperCanvas(targetCanvas, photoSourceElement) {
                const ctx = targetCanvas.getContext('2d');
                const w = C.w; const h = C.h;
                
                targetCanvas.width = w; targetCanvas.height = h;

                // 1. Draw Paper background with dynamic textured tint
                ctx.fillStyle = '#f5f1e6'; ctx.fillRect(0, 0, w, h);
                
                // Vintage Editorial Layout Accents (Double Borders)
                ctx.strokeStyle = '#1a1917'; ctx.lineWidth = 6; ctx.strokeRect(35, 35, w-70, h-70);
                ctx.lineWidth = 1.5; ctx.strokeRect(45, 45, w-90, h-90);

                // 2. Top Header Masthead Section
                ctx.fillStyle = '#1a1917'; ctx.textAlign = 'center';
                ctx.font = 'normal 24px "Playfair Display"'; ctx.textBaseline = 'top';
                ctx.fillText("THE TAKUAPA SENANUKUL MEMORIAL ARCHIVE", w/2, 65);

                // Border rules for the newspaper ear elements
                ctx.beginPath(); ctx.moveTo(45, 110); ctx.lineTo(w-45, 110); ctx.lineWidth = 2; ctx.stroke();
                
                // Date & Meta Section
                ctx.font = 'italic bold 18px "Sarabun"';
                ctx.textAlign = 'left'; ctx.fillText("ปีที่ ๘๔ ฉบับประวัติศาสตร์", 60, 123);
                ctx.textAlign = 'right'; ctx.fillText("พังงา, ประเทศไทย — ปีการศึกษา ๒๐๒๖", w-60, 123);
                
                ctx.beginPath(); ctx.moveTo(45, 155); ctx.lineTo(w-45, 155); ctx.lineWidth = 5; ctx.stroke();

                // 3. Huge Bold Newspaper Title Header ("ทรงเสนา")
                ctx.font = 'normal 125px "Chonburi"'; ctx.textAlign = 'center'; ctx.fillStyle = '#1a1917';
                ctx.fillText("ทรงเสนา", w/2, 175);
                
                ctx.font = 'italic 28px "Playfair Display"'; ctx.fillStyle = '#5e5a52';
                ctx.fillText("— The Premium Special Edition Portfolio —", w/2, 315);
                
                ctx.beginPath(); ctx.moveTo(60, 365); ctx.lineTo(w-60, 365); ctx.lineWidth = 1.5; ctx.stroke();

                // 4. Main Photo Placement (Single Frame Architecture)
                const pW = 1060; const pH = 750; // High clarity landscape display frame
                const pX = (w - pW) / 2; const pY = 400;

                // Photo frame background border box
                ctx.fillStyle = '#eadecc'; ctx.fillRect(pX - 10, pY - 10, pW + 20, pH + 20);
                ctx.strokeStyle = '#1a1917'; ctx.lineWidth = 2; ctx.strokeRect(pX - 10, pY - 10, pW + 20, pH + 20);

                if(photoSourceElement) {
                    // Extract and crop image to fit the layout perfectly
                    ctx.save();
                    ctx.beginPath(); ctx.rect(pX, pY, pW, pH); ctx.clip();
                    
                    // Draw image with calculated cover values
                    const sR = photoSourceElement.width / photoSourceElement.height;
                    const tR = pW / pH;
                    let sx, sy, sw, sh;
                    if(sR > tR) { sh = photoSourceElement.height; sw = sh * tR; sx = (photoSourceElement.width - sw) / 2; sy = 0; } 
                    else { sw = photoSourceElement.width; sh = sw / tR; sx = 0; sy = (photoSourceElement.height - sh) / 2; }
                    
                    ctx.drawImage(photoSourceElement, sx, sy, sw, sh, pX, pY, pW, pH);
                    ctx.restore();

                    // Apply Newspaper Print Ink Processing via image matrix filter lookup
                    const imgData = ctx.getImageData(pX, pY, pW, pH);
                    const d = imgData.data;
                    for (let i = 0; i < d.length; i += 4) {
                        let r = d[i], g = d[i+1], b = d[i+2];
                        // High Contrast Monochrome formulation
                        let gray = 0.299 * r + 0.587 * g + 0.114 * b;
                        // Boost contrast for authentic newspaper look
                        gray = (gray - 128) * 1.3 + 128;
                        gray = Math.max(0, Math.min(255, gray));
                        d[i] = d[i+1] = d[i+2] = gray;
                    }
                    ctx.putImageData(imgData, pX, pY);
                }

                // Photo Caption
                ctx.fillStyle = '#1a1917'; ctx.font = 'italic 18px "Sarabun"'; ctx.textAlign = 'center';
                ctx.fillText("ภาพถ่ายบันทึกความทรงจำ ณ สตูดิโอเสนานุกูล เกียรติภูมิขจรไกลข้ามทศวรรษ", w/2, pY + pH + 35);

                ctx.beginPath(); ctx.moveTo(60, pY + pH + 60); ctx.lineTo(w-60, pY + pH + 60); ctx.lineWidth = 3; ctx.stroke();

                // 5. Multi-Column Faux News Articles Text (Global Thai Print Styling)
                const colY = pY + pH + 85;
                const colW = 340; const colGap = 20;
                
                // Column 1 Description
                ctx.textAlign = 'left'; ctx.fillStyle = '#1a1917';
                ctx.font = 'bold 24px "Sarabun"'; ctx.fillText("เกียรติภูมิแห่งเสนานุกูล", 60, colY);
                ctx.font = 'normal 18px "Sarabun"'; ctx.fillStyle = '#333';
                wrapText(ctx, "โรงเรียนตะกั่วป่าเสนานุกูล สถาบันการศึกษาอันทรงคุณค่าคู่แผ่นดินใต้ มุ่งมั่นพัฒนาเยาวชนและสร้างสรรค์นวัตกรรมสู่ระดับสากลอย่างยั่งยืน การเฉลิมฉลองครบรอบวาระพิเศษนี้นับเป็นอีกหนึ่งบันทึกหน้าสำคัญที่แสดงถึงพลังสามัคคีและความเป็นเลิศทางวิชาการและวัฒนธรรมอันโดดเด่น", 60, colY + 35, colW, 26);

                // Column 2 Description
                ctx.fillStyle = '#1a1917';
                ctx.font = 'bold 24px "Sarabun"'; ctx.fillText("สืบสานศาสตร์ศิลป์ถิ่นใต้", 60 + colW + colGap, colY);
                ctx.font = 'normal 18px "Sarabun"'; ctx.fillStyle = '#333';
                wrapText(ctx, "เยาวชนรุ่นใหม่ร่วมสืบสานอารยธรรมและอัตลักษณ์ความเป็นไทยขับเคลื่อนสู่ระดับโลก ด้วยการผสมผสานมรดกทางภูมิปัญญาท้องถิ่นเข้ากับเทคโนโลยีดิจิทัลสมัยใหม่ ส่งเสริมผลงานและความคิดสร้างสรรค์ให้ประจักษ์แก่สายตานานาอารยประเทศอย่างเต็มภาคภูมิในฐานะลูกเสนา", 60 + colW + colGap, colY + 35, colW, 26);

                // Column 3 Digital Integration & QR placeholder marker
                ctx.fillStyle = '#1a1917';
                ctx.font = 'bold 24px "Sarabun"'; ctx.fillText("GLOBAL ARCHIVE", 60 + (colW * 2) + (colGap * 2), colY);
                ctx.font = 'normal 18px "Sarabun"'; ctx.fillStyle = '#333';
                wrapText(ctx, "บันทึกข้อมูลดิจิทัลนี้ถูกจัดเก็บระบบออนไลน์เพื่อส่งต่อความทรงจำอันทรงคุณค่าสู่อนาคต ท่านสามารถสแกนบาร์โค้ดคิวอาร์ที่ปรากฏอยู่บริเวณมุมขวาของหน้าหนังสือพิมพ์ฉบับพิเศษนี้เพื่อเข้าชมและดาวน์โหลดไฟล์ภาพและวิดีโอต้นฉบับความละเอียดสูงได้ทันที", 60 + (colW * 2) + (colGap * 2), colY + 35, colW, 26);
            }

            function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
                const words = text.split(''); let line = '';
                for(let n = 0; n < words.length; n++) {
                    let testLine = line + words[n];
                    let metrics = ctx.measureText(testLine);
                    if (metrics.width > maxWidth && n > 0) {
                        ctx.fillText(line, x, y); line = words[n]; y += lineHeight;
                    } else { line = testLine; }
                }
                ctx.fillText(line, x, y);
            }

            function renderNewspaperOutput() {
                drawNewspaperCanvas(D.canvas, s.capturedPhoto);
                
                const dataUrl = D.canvas.toDataURL('image/jpeg', 0.95);
                D.final.src = dataUrl;
                
                changeScreen('res');
                
                // Slide out paper machine simulation effect
                setTimeout(() => { D.final.classList.add('ejected'); }, 300);

                confetti({ particleCount: 140, spread: 65, origin: { y: 0.6 }, colors: ['#c5a880', '#1a1917', '#ffffff'] });

                setTimeout(() => {
                    document.getElementById('res-sidebar').classList.add('show');
                    uploadDigitalCopy(dataUrl);
                }, 2200);
            }

            async function uploadDigitalCopy(base64Data) {
                const log = document.getElementById('log-text');
                const fill = document.getElementById('load-fill');
                
                let p = 0;
                const int = setInterval(() => { if(p < 90) p += 7; fill.style.width = p+"%"; }, 100);

                try {
                    const fd = new FormData(); fd.append("image", base64Data.split(',')[1]);
                    log.innerText = "> Syncing cloud server archive...";
                    
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, { method: "POST", body: fd });
                    const resJson = await res.json();
                    
                    clearInterval(int); fill.style.width = "100%";

                    if(resJson.success) {
                        log.innerText = "> Press Generation Completed Successfully!";
                        document.getElementById('qrcode').innerHTML = "";
                        new QRCode(document.getElementById("qrcode"), {
                            text: resJson.data.url, width: 140, height: 140,
                            colorDark : "#1a1917", colorLight : "#f5f2e9",
                            correctLevel : QRCode.CorrectLevel.H
                        });
                        document.getElementById('qr-box').classList.add('active');
                    } else { throw new Error(); }
                } catch(e) {
                    clearInterval(int); log.innerText = "> Cloud archive error. Saving locally initialized.";
                }
            }

            function downloadStaticImage() {
                const a = document.createElement('a'); a.download = `Takuapa_Sena_Newspaper_${Date.now()}.jpg`;
                a.href = D.final.src; a.click();
            }

            return { startCamera, toggleCamFlip, toggleTimer, toggleMirror, takePressPhoto, downloadStaticImage };
        })();
    </script>
</body>
</html>
